name: AI Workspace CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-workspace-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Run backend tests
        working-directory: Backend
        run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: Frontend
        run: npm run lint

      - name: Build frontend bootstrap
        working-directory: Frontend
        run: npm run build

  workspace:
    name: Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            AI_Workspace/MCP_Server/package-lock.json
            Backend/package-lock.json
            Frontend/package-lock.json

      - name: Install MCP server dependencies
        working-directory: AI_Workspace/MCP_Server
        run: npm ci

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Run MCP and monitor checks
        working-directory: AI_Workspace/MCP_Server
        run: npm run check

      - name: Run rollback runtime tests
        run: node --test AI_Workspace/scripts/rollback.test.mjs

      - name: Run docs registry tests
        run: node --test AI_Workspace/scripts/docs-registry.test.mjs

      - name: Run MCP event contract tests
        run: node --test AI_Workspace/scripts/mcp-event-contract.test.mjs

      - name: Run MCP smoke tests
        run: node --test AI_Workspace/scripts/mcp-smoke.test.mjs

      - name: Run GitHub agent flow tests
        run: node --test AI_Workspace/scripts/github/github-agent-flow.test.mjs

      - name: Run GitHub agent CLI dry-run tests
        run: node --test AI_Workspace/scripts/github/github-cli-dryrun.test.mjs
