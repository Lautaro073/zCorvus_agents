name: Bug report
description: Reporta un fallo funcional o operativo del AI Workspace
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumen
      description: Que esta fallando
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Pasos para reproducir
      description: Comandos, flujo o contexto exacto
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impacto
      description: Que agente, flujo o modulo queda afectado
