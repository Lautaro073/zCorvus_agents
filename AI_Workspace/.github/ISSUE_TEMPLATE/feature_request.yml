name: Feature request
description: Propone una nueva capacidad para agentes, monitor, MCP o runtime
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Objetivo
      description: Que quieres lograr
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: Por que hace falta y que pain resuelve
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Alcance sugerido
      description: Areas afectadas como Agents, MCP_Server, AgentMonitor, scripts o docs

  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceptacion
      description: Como sabremos que esta listo
